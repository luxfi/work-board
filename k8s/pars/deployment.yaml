apiVersion: apps/v1
kind: Deployment
metadata:
  name: work-board
  namespace: pars
  labels:
    app: work-board
spec:
  replicas: 2
  selector:
    matchLabels:
      app: work-board
  template:
    metadata:
      labels:
        app: work-board
    spec:
      # ghcr.io/luxfi is private; pull with a luxfi read credential (copied from
      # the proven zoo-mainnet `ghcr-luxfi` secret). Same registry as the source
      # repo — never mixed into another org.
      imagePullSecrets:
        - name: ghcr-luxfi
      containers:
        - name: work-board
          # Pinned to the immutable CI tag (ghcr.io/luxfi/work-board:pars-<sha>),
          # built by docker.yml's `pars` matrix leg (VITE_BRAND=pars). CI builds
          # every push to main; bump this to roll a new build.
          image: ghcr.io/luxfi/work-board:pars-28b6bff
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
