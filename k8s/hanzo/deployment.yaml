apiVersion: apps/v1
kind: Deployment
metadata:
  name: work-board
  namespace: hanzo-mainnet
  labels:
    app: work-board
spec:
  replicas: 2
  selector:
    matchLabels:
      app: work-board
  template:
    metadata:
      labels:
        app: work-board
    spec:
      # ghcr.io/luxfi is private; pull with the luxfi read credential (the same
      # ghcr-luxfi secret proven on zoo-mainnet/pars, copied into hanzo-mainnet).
      # Same registry as the source repo — never mixed into another org.
      imagePullSecrets:
        - name: ghcr-luxfi
      containers:
        - name: work-board
          # Pinned to the immutable CI tag (ghcr.io/luxfi/work-board:hanzo-<sha>),
          # built by docker.yml's `hanzo` matrix leg (VITE_BRAND=hanzo). CI builds
          # every push to main; bump this to roll a new build.
          image: ghcr.io/luxfi/work-board:hanzo-259a22b
          ports:
            - containerPort: 3000
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              memory: 128Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
